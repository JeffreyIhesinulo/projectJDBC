<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>FoodApp Admin — Login</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f5f6fa;
            color: #222;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.10);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }
        .logo {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(120deg, #8e2de2, #4a00e0);
        }
        h1 { margin: 0; font-size: 20px; }
        p { margin: 6px 0 0; color: #666; font-size: 13px; }
        label { display:block; font-size: 13px; margin: 14px 0 6px; color:#444; }
        input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 14px;
        }
        input:focus { border-color: #4a00e0; box-shadow: 0 0 0 3px rgba(74,0,224,0.12); }
        button {
            width: 100%;
            margin-top: 16px;
            padding: 11px 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #4a00e0;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }
        button:hover { background: #3712c9; }
        .hint {
            margin-top: 12px;
            font-size: 12px;
            color: #777;
            line-height: 1.4;
        }
        .error {
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            background: #fff3f3;
            color: #b00020;
            border: 1px solid #ffd0d0;
            display: none;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="brand">
        <div class="logo"></div>
        <div>
            <h1>FoodApp Admin</h1>
            <p>Login to manage the menu</p>
        </div>
    </div>

    <label>Username</label>
    <input id="username" type="text" placeholder="admin" />

    <label>Password</label>
    <input id="password" type="password" placeholder="••••••••" />

    <button onclick="login()">Login</button>

    <div id="error" class="error"></div>

    <div class="hint">
        Сейчас это демо на фронте: логин “фейковый”.<br/>
        Потом подключим к сервлету <code>/admin/login</code> (AdminDAO).
    </div>
</div>

<script>
    // DEMO ONLY: later -> POST /admin/login (server)
    function login() {
        const u = document.getElementById("username").value.trim();
        const p = document.getElementById("password").value;

        // demo credentials
        if (u === "admin" && p === "admin123") {
            window.location.href = "admin-panel.html";
            return;
        }

        const err = document.getElementById("error");
        err.style.display = "block";
        err.textContent = "Invalid username or password.";
    }
</script>
</body>
</html>
