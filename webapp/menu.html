<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FoodApp</title>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
        }

        header {
            background: linear-gradient(120deg, #8e2de2, #4a00e0);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .menu-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

        .menu-card button {
            background: #4a00e0;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        .cart {
            margin-top: 40px;
            background: white;
            padding: 25px;
            border-radius: 10px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .cart-item input {
            width: 50px;
        }

        .total {
            font-weight: bold;
            margin-top: 15px;
        }

        button.place {
            margin-top: 20px;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>
    <h1>FoodApp</h1>
    <p>Restaurant demo</p>
</header>

<div class="container">

    <h2>Menu</h2>

    <div class="menu-grid">
        <div class="menu-card">
            <h3>Burger</h3>
            <p>€5.00</p>
            <button onclick="addToCart(1,'Burger',5)">Add</button>
        </div>
        <div class="menu-card">
            <h3>Pizza</h3>
            <p>€8.00</p>
            <button onclick="addToCart(2,'Pizza',8)">Add</button>
        </div>
        <div class="menu-card">
            <h3>Cola</h3>
            <p>€2.50</p>
            <button onclick="addToCart(3,'Cola',2.5)">Add</button>
        </div>
    </div>

    <div class="cart">
        <h2>Cart</h2>
        <div id="cartItems"></div>
        <div class="total" id="totalPrice">Total: €0.00</div>

        <button class="place" onclick="placeOrder()">Place Order</button>
    </div>

</div>

<script>
    /*
     JS CART — 1 в 1 логика с Java Cart
    */
    const cart = {}; // key = menuId

    function addToCart(id, name, price) {
        if (!cart[id]) {
            cart[id] = { name, price, qty: 1 };
        } else {
            cart[id].qty++;
        }
        renderCart();
    }

    function changeQty(id, qty) {
        if (qty <= 0) {
            delete cart[id];
        } else {
            cart[id].qty = qty;
        }
        renderCart();
    }

    function renderCart() {
        const container = document.getElementById("cartItems");
        container.innerHTML = "";
        let total = 0;

        for (const id in cart) {
            const item = cart[id];
            const subtotal = item.qty * item.price;
            total += subtotal;

            container.innerHTML += `
        <div class="cart-item">
            <span>${item.name} (€${item.price})</span>
            <input type="number" min="1" value="${item.qty}"
                   onchange="changeQty(${id}, this.value)">
            <span>€${subtotal.toFixed(2)}</span>
        </div>`;
        }

        document.getElementById("totalPrice").innerText =
            "Total: €" + total.toFixed(2);
    }

    function placeOrder() {
        /*
         ЭТО ТО, ЧТО ПОЙДЁТ В JAVA:
         [
           { menuId: 1, qty: 2 },
           { menuId: 3, qty: 1 }
         ]
        */
        const order = [];
        for (const id in cart) {
            order.push({
                menuId: parseInt(id),
                qty: cart[id].qty
            });
        }

        console.log("SEND TO SERVER:", order);

        alert("Order sent (check console)");
    }
</script>

</body>
</html>
